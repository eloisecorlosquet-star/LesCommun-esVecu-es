<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Les commun·es vécu·es — Imprimer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: white; }

    .print-viewer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      background: #f5f3ee;
    }

    h1 {
      font-family: serif;
      font-size: 18px;
      font-weight: normal;
      font-style: italic;
      color: rgba(10,10,8,0.5);
      margin-bottom: 24px;
      text-align: center;
    }

    .pdf-pages {
      display: flex;
      flex-direction: column;
      gap: 32px;
      align-items: center;
      width: 100%;
    }

    .pdf-page {
      width: 100%;
      max-width: 794px; /* A4 width at 96dpi */
      background: white;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    }

    .pdf-page img {
      width: 100%;
      height: auto;
      display: block;
    }

    .print-btn {
      margin-top: 32px;
      padding: 12px 36px;
      background: #0A0A08;
      color: white;
      border: none;
      border-radius: 20px;
      font-family: serif;
      font-size: 15px;
      font-style: italic;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .print-btn:hover { opacity: 0.7; }

    .back-btn {
      margin-top: 12px;
      padding: 10px 24px;
      background: transparent;
      color: rgba(10,10,8,0.5);
      border: 1.5px solid rgba(10,10,8,0.2);
      border-radius: 20px;
      font-family: serif;
      font-size: 13px;
      font-style: italic;
      cursor: pointer;
      transition: all 0.2s;
    }
    .back-btn:hover { border-color: #0A0A08; color: #0A0A08; }

    @media print {
      .print-viewer { padding: 0; background: white; }
      h1, .print-btn, .back-btn { display: none; }
      .pdf-pages { gap: 0; }
      .pdf-page { max-width: 100%; box-shadow: none; page-break-after: always; }
    }
  </style>
</head>
<body>
  <div class="print-viewer">
    <h1>Votre carte — Les commun·es vécu·es</h1>
    <div class="pdf-pages" id="pdf-pages">
      <!-- Les pages du PDF sont affichées comme images -->
      <div class="pdf-page">
        <img src="print_p1.jpg" alt="Page 1 — carte" onerror="this.parentElement.innerHTML='<div style=\'padding:80px;text-align:center;font-family:serif;font-style:italic;color:#aaa\'>Page 1 non disponible</div>'">
      </div>
      <div class="pdf-page">
        <img src="print_p2.jpg" alt="Page 2 — légende" onerror="this.parentElement.innerHTML='<div style=\'padding:80px;text-align:center;font-family:serif;font-style:italic;color:#aaa\'>Page 2 non disponible</div>'">
      </div>
    </div>
    <button class="print-btn" onclick="window.print()">Imprimer cette carte</button>
    <button class="back-btn" onclick="window.close()">← Retour au site</button>
  </div>
</body>
</html>
